name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    name: "PHPUnit: MW ${{ matrix.mw }}, PHP ${{ matrix.php }} (TYPE ${{ matrix.type }})"

    strategy:
      matrix:
        include:
          - mw: 'REL1_43'
            php: 8.1
            type: normal
            experimental: false
          - mw: 'REL1_44'
            php: 8.2
            type: normal
            experimental: false
          - mw: 'REL1_45'
            php: 8.3
            type: normal
            experimental: false
          - mw: 'master'
            php: 8.4
            type: normal
            experimental: true
          - mw: 'master'
            php: 8.5
            type: normal
            experimental: true

    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    defaults:
      run:
        working-directory: mediawiki

    env:
      MW_ROOT: mediawiki
      TYPE: ${{ matrix.type }}


    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer

      - name: Disable Composer block-insecure
        working-directory: ~
        run: composer config --global audit.block-insecure false

      - name: Cache MediaWiki
        id: cache-mediawiki
        uses: actions/cache@v4
        with:
          path: |
            mediawiki
            !mediawiki/extensions/
            !mediawiki/vendor/
          key: mw_${{ matrix.mw }}-php${{ matrix.php }}-v2

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}

      - uses: actions/checkout@v4
        with:
          path: EarlyCopy

      - name: Install MediaWiki
        if: steps.cache-mediawiki.outputs.cache-hit != 'true'
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/installWiki.sh ${{ matrix.mw }} BootstrapComponents

      - uses: actions/checkout@v4
        with:
          path: mediawiki/extensions/BootstrapComponents

      - name: Composer update
        run: composer update

      - name: Upload images
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/uploadImages.sh

      - if: env.TYPE != 'coverage' && matrix.mw != 'master'
        name: Run PHPUnit w/o coverage
        run: php tests/phpunit/phpunit.php -c extensions/BootstrapComponents/ --testsuite bootstrap-components-unit

      - if: env.TYPE == 'coverage' && matrix.mw != 'master'
        name: Run PHPUnit w/ coverage
        run: php tests/phpunit/phpunit.php -c extensions/BootstrapComponents/ --testsuite bootstrap-components-unit --coverage-clover coverage.clover

      - if: matrix.mw == 'master'
        name: Run PHPUnit (MW master)
        run: |
          # MediaWiki master (≥ 1.46) removed tests/phpunit/phpunit.php; the
          # supported runner is vendor/bin/phpunit against the config
          # generated by `composer phpunit:config` from phpunit.xml.template
          # (which installWiki.sh's git clone ships).
          composer phpunit:config
          vendor/bin/phpunit -c extensions/BootstrapComponents/phpunit.xml.dist --bootstrap tests/phpunit/bootstrap.php --testsuite bootstrap-components-unit

      - if: env.TYPE == 'coverage'
        name: upload coverage report
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/uploadCoverageReport.sh
